<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicketFlow — Event Booking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --white:      #ffffff;
      --offwhite:   #f8f8fc;
      --surface:    #f1f1f8;
      --surface2:   #e8e8f4;
      --border:     rgba(0,0,0,0.07);
      --border2:    rgba(0,0,0,0.13);
      --text:       #0c0c1d;
      --text2:      #3d3d5c;
      --muted:      #8888aa;
      --accent:     #6c47ff;
      --accent-lt:  #ede9ff;
      --accent2:    #a855f7;
      --teal:       #0ea5e9;
      --teal-lt:    #e0f2fe;
      --success:    #22c55e;
      --success-lt: #dcfce7;
      --danger:     #ef4444;
      --danger-lt:  #fef2f2;
      --warn:       #f59e0b;
      --warn-lt:    #fef3c7;
      --shadow-xs:  0 1px 4px rgba(0,0,0,0.05);
      --shadow-sm:  0 2px 10px rgba(0,0,0,0.07);
      --shadow-md:  0 8px 28px rgba(0,0,0,0.09);
      --shadow-lg:  0 20px 56px rgba(0,0,0,0.11);
      --shadow-xl:  0 32px 80px rgba(0,0,0,0.14);
      --r-sm:       10px;
      --r:          14px;
      --r-lg:       20px;
      --r-xl:       28px;
      --r-full:     999px;
      --fh:         'Plus Jakarta Sans', sans-serif;
      --fb:         'Plus Jakarta Sans', sans-serif;
      --fm:         'JetBrains Mono', monospace;
      --fg:         'Space Grotesk', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      background: var(--offwhite);
      color: var(--text);
      font-family: var(--fb);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient background blobs */
    .bg-blob {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      filter: blur(90px); opacity: 0.22;
    }
    .bg-blob-1 { width: 700px; height: 700px; background: #c4b5fd; top: -250px; right: -200px; }
    .bg-blob-2 { width: 550px; height: 550px; background: #bae6fd; bottom: -150px; left: -150px; }
    .bg-blob-3 { width: 400px; height: 400px; background: #bbf7d0; top: 40%; left: 30%; }

    .container { max-width: 1160px; margin: 0 auto; padding: 0 28px; position: relative; z-index: 1; }

    /* ═══ NAV ═══ */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(248,248,252,0.82);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1160px; margin: 0 auto; padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      height: 66px;
    }
    .logo {
      font-family: var(--fg); font-weight: 700; font-size: 1.25rem;
      color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: 10px; letter-spacing: -0.3px;
    }
    .logo-mark {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; box-shadow: 0 4px 12px rgba(108,71,255,0.35);
    }
    .nav-right { display: flex; align-items: center; gap: 6px; }
    .nav-link {
      background: none; border: none; cursor: pointer;
      font-family: var(--fb); font-size: 0.875rem; font-weight: 500;
      color: var(--muted); padding: 8px 16px; border-radius: var(--r-full);
      transition: all 0.18s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface); }
    .nav-cta {
      background: var(--text); color: white;
      padding: 9px 22px; border-radius: var(--r-full);
      font-size: 0.875rem; font-weight: 600;
      border: none; cursor: pointer; font-family: var(--fb);
      transition: all 0.2s;
    }
    .nav-cta:hover { background: var(--accent); box-shadow: 0 6px 20px rgba(108,71,255,0.3); transform: translateY(-1px); }
    .user-pill {
      display: flex; align-items: center; gap: 9px;
      background: var(--white); border: 1px solid var(--border2);
      border-radius: var(--r-full); padding: 4px 16px 4px 4px;
      cursor: pointer; box-shadow: var(--shadow-xs); transition: all 0.2s;
    }
    .user-pill:hover { border-color: var(--accent); box-shadow: 0 4px 14px rgba(108,71,255,0.15); }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; color: white;
    }
    .user-name { font-size: 0.875rem; font-weight: 600; }

    /* ═══ HERO ═══ */
    .hero {
      padding: 88px 28px 72px;
      position: relative; z-index: 1;
    }
    .hero-grid {
      max-width: 1160px; margin: 0 auto;
      display: grid; grid-template-columns: 1.1fr 0.9fr;
      gap: 64px; align-items: center;
    }
    .hero-kicker {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--white); border: 1px solid var(--border2);
      border-radius: var(--r-full); padding: 6px 16px 6px 8px;
      font-size: 0.78rem; font-weight: 600; color: var(--text2);
      margin-bottom: 24px; box-shadow: var(--shadow-sm);
    }
    .kicker-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; border-radius: var(--r-full);
      padding: 3px 10px; font-size: 0.7rem; font-weight: 700;
    }
    .hero h1 {
      font-family: var(--fg); font-weight: 700;
      font-size: clamp(2.6rem, 4.5vw, 3.8rem);
      line-height: 1.1; letter-spacing: -1.5px;
      margin-bottom: 20px; color: var(--text);
    }
    .hero h1 .grad {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--teal) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-desc {
      font-size: 1.05rem; color: var(--muted); line-height: 1.78;
      margin-bottom: 36px; max-width: 440px; font-weight: 400;
    }
    .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    .hero-stats {
      display: flex; gap: 28px; margin-top: 44px; padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .hstat-num {
      font-family: var(--fg); font-size: 1.5rem; font-weight: 700;
      color: var(--text);
    }
    .hstat-label { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    /* Hero right — glass card stack */
    .hero-right { position: relative; }
    .glass-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-xl);
      padding: 28px;
      position: relative; overflow: hidden;
    }
    .glass-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(145deg, rgba(108,71,255,0.04), rgba(14,165,233,0.03));
      border-radius: inherit; pointer-events: none;
    }
    .gc-label { font-size: 0.72rem; font-weight: 700; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 16px; }
    .gc-event { font-family: var(--fg); font-size: 1.35rem; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; }
    .gc-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 22px; }
    .gc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
    .gc-chip { background: var(--surface); border-radius: var(--r-sm); padding: 12px; }
    .gc-chip-label { font-size: 0.68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .gc-chip-val { font-size: 0.9rem; font-weight: 600; }
    .gc-price { font-family: var(--fg); font-size: 2.2rem; font-weight: 700; color: var(--accent); letter-spacing: -1px; margin-bottom: 18px; }
    .gc-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; border: none; border-radius: var(--r);
      font-family: var(--fb); font-weight: 700; font-size: 0.9rem;
      cursor: pointer; letter-spacing: 0.2px;
      box-shadow: 0 8px 24px rgba(108,71,255,0.3);
      transition: all 0.2s;
    }
    .gc-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(108,71,255,0.4); }
    .float-pill {
      position: absolute; background: var(--white);
      border: 1px solid var(--border2); border-radius: var(--r);
      padding: 10px 14px; box-shadow: var(--shadow-md);
      display: flex; align-items: center; gap: 10px;
      font-size: 0.8rem; font-weight: 500;
      animation: float 3.5s ease-in-out infinite;
    }
    .float-pill.p1 { top: -18px; right: 24px; animation-delay: 0s; }
    .float-pill.p2 { bottom: -18px; left: 24px; animation-delay: 1.8s; }
    .fp-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

    /* ═══ BUTTONS ═══ */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--fb); font-weight: 600; font-size: 0.9rem;
      border: none; cursor: pointer; text-decoration: none;
      padding: 12px 26px; border-radius: var(--r-full);
      transition: all 0.2s; letter-spacing: 0.1px;
    }
    .btn-dark { background: var(--text); color: white; }
    .btn-dark:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(108,71,255,0.3); }
    .btn-ghost { background: var(--white); color: var(--text); border: 1.5px solid var(--border2); box-shadow: var(--shadow-xs); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
    .btn-grad { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; box-shadow: 0 8px 24px rgba(108,71,255,0.28); }
    .btn-grad:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(108,71,255,0.38); }
    .btn-sm { padding: 8px 18px; font-size: 0.82rem; }
    .btn-full { width: 100%; justify-content: center; border-radius: var(--r); }

    /* ═══ SECTION ═══ */
    section { padding: 52px 0; position: relative; z-index: 1; }
    .section-header { margin-bottom: 32px; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .section-title { font-family: var(--fg); font-size: clamp(1.5rem, 2.5vw, 2rem); font-weight: 700; letter-spacing: -0.5px; }
    .section-sub { font-size: 0.875rem; color: var(--muted); margin-top: 5px; }

    /* filter chips */
    .filter-row { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
    .chip {
      padding: 7px 18px; border-radius: var(--r-full);
      font-size: 0.82rem; font-weight: 600;
      border: 1.5px solid var(--border2); background: var(--white);
      cursor: pointer; transition: all 0.18s; color: var(--muted);
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { background: var(--text); color: white; border-color: var(--text); }

    /* ═══ EVENTS GRID ═══ */
    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

    .event-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--r-lg); overflow: hidden;
      box-shadow: var(--shadow-sm); cursor: pointer;
      transition: all 0.26s; display: flex; flex-direction: column;
    }
    .event-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: rgba(108,71,255,0.18); }

    .card-banner {
      height: 148px; position: relative;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .card-banner-emoji { font-size: 4rem; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1)); position: relative; z-index: 1; }
    .card-cat-pill {
      position: absolute; top: 14px; left: 14px;
      padding: 4px 12px; border-radius: var(--r-full);
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.3px;
      backdrop-filter: blur(8px);
    }
    .card-price-tag {
      position: absolute; top: 14px; right: 14px;
      background: white; border-radius: var(--r-sm);
      padding: 6px 12px; box-shadow: var(--shadow-sm);
      font-family: var(--fg); font-size: 1.05rem; font-weight: 700; color: var(--accent);
    }

    /* banner bg per category */
    .bn-music      { background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%); }
    .bn-sports     { background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); }
    .bn-comedy     { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
    .bn-theatre    { background: linear-gradient(135deg, #ffe4e6 0%, #fecdd3 100%); }
    .bn-conference { background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%); }
    .bn-default    { background: var(--surface); }

    /* cat pill colors */
    .cp-music      { background: #ede9fe; color: #5b21b6; }
    .cp-sports     { background: #dcfce7; color: #166534; }
    .cp-comedy     { background: #fef3c7; color: #92400e; }
    .cp-theatre    { background: #ffe4e6; color: #9f1239; }
    .cp-conference { background: #dbeafe; color: #1e40af; }
    .cp-default    { background: var(--surface); color: var(--muted); }

    .card-body { padding: 20px 22px 22px; flex: 1; display: flex; flex-direction: column; }
    .card-title { font-family: var(--fg); font-size: 1.1rem; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 6px; }
    .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    .card-meta-row { display: flex; align-items: center; gap: 9px; font-size: 0.8rem; color: var(--text2); }
    .meta-icon { width: 22px; height: 22px; border-radius: 6px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; flex-shrink: 0; }

    .cap-bar { height: 4px; background: var(--surface2); border-radius: 99px; margin-bottom: 5px; overflow: hidden; }
    .cap-fill { height: 100%; border-radius: 99px; transition: width 0.7s ease; }
    .cap-low  { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .cap-med  { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .cap-high { background: linear-gradient(90deg, #ef4444, #f87171); }
    .cap-info { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); margin-bottom: 16px; }

    .card-foot { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .org-chip { display: flex; align-items: center; gap: 8px; }
    .org-av { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #e0e7ff, #c7d2fe); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: var(--accent); }
    .org-name { font-size: 0.78rem; color: var(--muted); font-weight: 500; }

    /* ═══ MODAL ═══ */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(12,12,29,0.45);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--white); border-radius: var(--r-xl);
      width: 100%; max-width: 490px; max-height: 92vh; overflow-y: auto;
      position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.18);
      animation: pop 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes pop { from{opacity:0;transform:scale(0.93) translateY(14px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .modal-head { padding: 26px 26px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; }
    .modal-title { font-family: var(--fg); font-size: 1.3rem; font-weight: 700; letter-spacing: -0.3px; }
    .modal-sub { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }
    .modal-x { width: 32px; height: 32px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.18s; }
    .modal-x:hover { background: var(--surface2); color: var(--text); }
    .modal-body { padding: 24px 26px 28px; }

    /* ═══ AUTH TABS ═══ */
    .seg { display: flex; background: var(--surface); border-radius: var(--r-sm); padding: 4px; gap: 3px; margin-bottom: 24px; }
    .seg-btn { flex: 1; padding: 9px; border-radius: 8px; background: none; border: none; cursor: pointer; font-family: var(--fb); font-size: 0.875rem; font-weight: 600; color: var(--muted); transition: all 0.18s; }
    .seg-btn.active { background: var(--white); color: var(--text); box-shadow: var(--shadow-sm); }

    /* ═══ FORM ═══ */
    .fg-group { margin-bottom: 16px; }
    .fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .fg-label { display: block; font-size: 0.74rem; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 7px; }
    .fg-input, .fg-select {
      width: 100%; background: var(--surface); border: 1.5px solid transparent;
      color: var(--text); font-family: var(--fb); font-size: 0.9rem;
      padding: 11px 14px; border-radius: var(--r-sm); outline: none; transition: all 0.2s;
    }
    .fg-input:focus, .fg-select:focus { background: var(--white); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(108,71,255,0.1); }
    .fg-hint { font-size: 0.73rem; color: var(--muted); margin-top: 5px; }
    .fg-select option { background: white; }

    /* ═══ ALERT ═══ */
    .alert { padding: 11px 15px; border-radius: var(--r-sm); font-size: 0.84rem; margin-bottom: 18px; display: none; }
    .alert.show { display: block; }
    .alert-err { background: var(--danger-lt); border: 1px solid #fecaca; color: #991b1b; }
    .alert-ok  { background: var(--success-lt); border: 1px solid #bbf7d0; color: #166534; }

    /* ═══ STEPS ═══ */
    .steps { display: flex; align-items: center; margin-bottom: 24px; }
    .step { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--muted); }
    .step-n { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; flex-shrink: 0; transition: all 0.3s; }
    .step.act .step-n { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 12px rgba(108,71,255,0.35); }
    .step.act { color: var(--text); font-weight: 600; }
    .step.done .step-n { background: var(--success); color: white; border-color: var(--success); }
    .step-ln { flex: 1; height: 1.5px; background: var(--border2); margin: 0 6px; }
